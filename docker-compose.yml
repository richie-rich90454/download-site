services:
  download-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: download-server
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
