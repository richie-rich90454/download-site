<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Richard's Blogs - Application Download</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="offline-banner is-hidden" id="offline-banner">You are offline. Some features may not work.</div>
        <div class="container">
            <h1>Richard's Blogs Application Downloads</h1>
            <div class="subhead">Choose your app, version &amp; platform</div>
            <div class="search-bar">
                <label for="release-search">Search apps</label>
                <input id="release-search" type="search" placeholder="Filter apps..." autocomplete="off" />
            </div>
            <div id="app-grid" class="app-grid"></div>
            <hr />
            <div class="api-note">
                <span>Update API:</span>
                <code>/api/update/:app</code>
                <span>Download API:</span>
                <code>/download/:app?version=:version</code>
            </div>
        </div>

        <div id="notes-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-dialog">
                <div class="modal-header">
                    <h3 id="modal-title" class="modal-title">Release notes</h3>
                    <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
                </div>
                <div id="modal-body" class="modal-body">
                    <div class="release-notes"></div>
                </div>
            </div>
        </div>

        <script type="module" src="/src/public/script.ts"></script>
    </body>
</html>
