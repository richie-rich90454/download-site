<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Richard's Blogs - Application Download</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="offline-banner is-hidden" id="offline-banner">You are offline. Some features may not work.</div>
        <div class="container">
            <h1>Richard's Blogs Application Downloads</h1>
            <div class="subhead">Choose your app, version &amp; platform</div>
            <div class="search-bar">
                <label for="app-search">Search apps</label>
                <input id="app-search" type="search" placeholder="Filter apps..." autocomplete="off" />
            </div>
            <div id="app-grid" class="app-grid"></div>
            <hr />
            <div class="api-note">
                <span>Update API:</span>
                <code>/api/update/:app</code>
                <span>Download API:</span>
                <code>/download/:app?version=:version</code>
            </div>
        </div>

        <div id="notes-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-dialog">
                <div class="modal-header">
                    <h3 id="modal-title" class="modal-title">Release notes</h3>
                    <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
                </div>
                <div id="modal-body" class="modal-body">
                    <div class="release-notes"></div>
                </div>
            </div>
        </div>

        <script>
            (function () {
                "use strict";

                const state = {
                    apps: [],
                    releasesByApp: {},
                    selectedByApp: {},
                    platforms: ["windows", "darwin", "linux"],
                    platformLabels: { windows: "Windows", darwin: "macOS", linux: "Linux" }
                };

                const grid = document.getElementById("app-grid");
                const searchInput = document.getElementById("app-search");
                const modal = document.getElementById("notes-modal");
                const modalTitle = document.getElementById("modal-title");
                const modalBody = document.getElementById("modal-body");
                const modalClose = document.getElementById("modal-close");
                const offlineBanner = document.getElementById("offline-banner");

                function detectPlatform() {
                    const userAgent = navigator.userAgent;
                    if (userAgent.indexOf("Win") >= 0) {
                        return "windows";
                    }
                    if (userAgent.indexOf("Mac") >= 0) {
                        return "darwin";
                    }
                    if (userAgent.indexOf("Linux") >= 0 || userAgent.indexOf("X11") >= 0) {
                        return "linux";
                    }
                    return "windows";
                }

                function formatBytes(bytes) {
                    if (bytes === 0) {
                        return "0 B";
                    }
                    const units = ["B", "KB", "MB", "GB"];
                    const index = Math.floor(Math.log(bytes) / Math.log(1024));
                    const value = bytes / Math.pow(1024, index);
                    return value.toFixed(2) + " " + units[index];
                }

                function formatDate(iso) {
                    if (iso === undefined || iso === null || iso.length === 0) {
                        return "";
                    }
                    const date = new Date(iso);
                    if (isNaN(date.getTime())) {
                        return iso;
                    }
                    return date.toLocaleDateString(undefined, {
                        year: "numeric",
                        month: "short",
                        day: "numeric"
                    });
                }

                function escapeHtml(text) {
                    const div = document.createElement("div");
                    div.textContent = text;
                    return div.innerHTML;
                }

                function renderMarkdown(text) {
                    if (text === undefined || text === null) {
                        return "";
                    }
                    let html = escapeHtml(text);
                    html = html
                        .replace(/^###### (.*$)/gim, "<h6>$1</h6>")
                        .replace(/^##### (.*$)/gim, "<h5>$1</h5>")
                        .replace(/^#### (.*$)/gim, "<h4>$1</h4>")
                        .replace(/^### (.*$)/gim, "<h3>$1</h3>")
                        .replace(/^## (.*$)/gim, "<h2>$1</h2>")
                        .replace(/^# (.*$)/gim, "<h1>$1</h1>")
                        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
                        .replace(/\*(.*?)\*/g, "<em>$1</em>")
                        .replace(/`([^`]+)`/g, "<code>$1</code>")
                        .replace(/^\s*-\s+(.*)$/gim, "<li>$1</li>")
                        .replace(/(<li>.*<\/li>)/s, "<ul>$1</ul>")
                        .replace(/\n/g, "<br>");
                    return html;
                }

                function setSelected(appId, key, value) {
                    if (state.selectedByApp[appId] === undefined) {
                        state.selectedByApp[appId] = {};
                    }
                    state.selectedByApp[appId][key] = value;
                }

                function getSelected(appId, key, fallback) {
                    if (state.selectedByApp[appId] === undefined) {
                        return fallback;
                    }
                    const value = state.selectedByApp[appId][key];
                    return value !== undefined ? value : fallback;
                }

                function findAssetForPlatform(release, platform) {
                    const assets = release.assets;
                    const platformPatterns = {
                        windows: [".exe", ".msi", "-windows-", "_windows_", "-win-", "_win_", "-win32", "-win64"],
                        darwin: [".dmg", ".pkg", "-macos-", "_macos_", "-darwin-", "_darwin_", "-osx-", "_osx_"],
                        linux: [".appimage", ".deb", ".rpm", "-linux-", "_linux_", "-linux-gnu", "_linux-gnu"]
                    };
                    const patterns = platformPatterns[platform];
                    for (let i = 0; i < patterns.length; i = i + 1) {
                        const pattern = patterns[i];
                        for (let j = 0; j < assets.length; j = j + 1) {
                            const name = assets[j].name.toLowerCase();
                            if (name.indexOf(pattern) >= 0) {
                                return assets[j];
                            }
                        }
                    }
                    for (let k = 0; k < assets.length; k = k + 1) {
                        const name = assets[k].name.toLowerCase();
                        if (name.indexOf(".sig") < 0 && name.indexOf(".sha256") < 0) {
                            return assets[k];
                        }
                    }
                    return undefined;
                }

                function buildDownloadUrl(appId, version, platform) {
                    const base = "/download/" + encodeURIComponent(appId);
                    const params = [];
                    if (version !== undefined && version.length > 0) {
                        params.push("version=" + encodeURIComponent(version));
                    }
                    if (platform !== undefined && platform.length > 0) {
                        params.push("platform=" + encodeURIComponent(platform));
                    }
                    if (params.length === 0) {
                        return base;
                    }
                    return base + "?" + params.join("&");
                }

                function createElement(tag, className, text) {
                    const element = document.createElement(tag);
                    if (className !== undefined && className.length > 0) {
                        element.className = className;
                    }
                    if (text !== undefined && text.length > 0) {
                        element.textContent = text;
                    }
                    return element;
                }

                function showError(message) {
                    grid.innerHTML = "";
                    const card = createElement("div", "app-card");
                    const title = createElement("h2", "", "Unable to load apps");
                    const body = createElement("p", "", message);
                    card.appendChild(title);
                    card.appendChild(body);
                    grid.appendChild(card);
                }

                function showLoading() {
                    grid.innerHTML = "";
                    for (let i = 0; i < 2; i = i + 1) {
                        const card = createElement("div", "app-card");
                        const header = createElement("div", "skeleton skeleton-row", "");
                        header.style.width = "40%";
                        header.style.height = "28px";
                        const content = createElement("div", "skeleton-stack");
                        for (let j = 0; j < 3; j = j + 1) {
                            const row = createElement("div", "skeleton skeleton-row", "");
                            content.appendChild(row);
                        }
                        const actions = createElement("div", "skeleton-actions");
                        for (let k = 0; k < 3; k = k + 1) {
                            actions.appendChild(createElement("div", "skeleton skeleton-pill", ""));
                        }
                        card.appendChild(header);
                        card.appendChild(content);
                        card.appendChild(actions);
                        grid.appendChild(card);
                    }
                }

                function renderAppCard(app) {
                    const appId = app.id;
                    const releaseData = state.releasesByApp[appId];
                    const releases = releaseData !== undefined ? releaseData.releases : [];

                    const card = createElement("div", "app-card");
                    const title = createElement("h2", "", app.name);
                    card.appendChild(title);

                    const content = createElement("div", "app-card__content");

                    if (releases.length === 0) {
                        const empty = createElement("div", "loading", "Loading releases...");
                        content.appendChild(empty);
                        card.appendChild(content);
                        return card;
                    }

                    const selectedVersion = getSelected(appId, "version", releases[0].tag);
                    const selectedPlatform = getSelected(appId, "platform", detectPlatform());
                    const selectedRelease =
                        releases.find(function (r) {
                            return r.tag === selectedVersion;
                        }) || releases[0];
                    const selectedAsset = findAssetForPlatform(selectedRelease, selectedPlatform);

                    const versionRow = createElement("div", "version-selector");
                    const versionLabel = createElement("label", "", "Version:");
                    versionLabel.setAttribute("for", "version-" + appId);
                    const versionSelect = createElement("select");
                    versionSelect.id = "version-" + appId;
                    for (let i = 0; i < releases.length; i = i + 1) {
                        const release = releases[i];
                        const option = createElement("option");
                        option.value = release.tag;
                        option.textContent = release.tag + (release.prerelease ? " (pre)" : "");
                        if (release.tag === selectedVersion) {
                            option.selected = true;
                        }
                        versionSelect.appendChild(option);
                    }
                    versionSelect.addEventListener("change", function () {
                        setSelected(appId, "version", versionSelect.value);
                        renderAppGrid();
                    });
                    versionRow.appendChild(versionLabel);
                    versionRow.appendChild(versionSelect);
                    content.appendChild(versionRow);

                    const platformRow = createElement("div", "button-group");
                    for (let j = 0; j < state.platforms.length; j = j + 1) {
                        const platform = state.platforms[j];
                        const button = createElement("button", "btn btn-platform");
                        if (platform === selectedPlatform) {
                            button.classList.add("btn-primary");
                            button.classList.remove("btn-platform");
                        }
                        button.textContent = state.platformLabels[platform];
                        button.addEventListener("click", function () {
                            setSelected(appId, "platform", platform);
                            renderAppGrid();
                        });
                        platformRow.appendChild(button);
                    }
                    content.appendChild(platformRow);

                    const metaPanel = createElement("div", "meta-panel");
                    if (selectedRelease.publishedAt !== undefined && selectedRelease.publishedAt.length > 0) {
                        metaPanel.appendChild(
                            createElement("div", "", "Published: " + formatDate(selectedRelease.publishedAt))
                        );
                    }
                    if (selectedAsset !== undefined) {
                        const assetInfo = createElement("div", "meta-item--asset");
                        assetInfo.textContent =
                            "Asset: " + selectedAsset.name + " (" + formatBytes(selectedAsset.size) + ")";
                        metaPanel.appendChild(assetInfo);
                    } else {
                        metaPanel.appendChild(createElement("div", "", "No asset found for selected platform"));
                    }
                    content.appendChild(metaPanel);

                    const actions = createElement("div", "button-group");
                    const downloadLink = createElement("a", "btn btn-primary");
                    downloadLink.textContent = "Download";
                    downloadLink.href = buildDownloadUrl(appId, selectedVersion, selectedPlatform);
                    downloadLink.setAttribute("download", "");
                    if (selectedAsset === undefined) {
                        downloadLink.classList.add("is-hidden");
                    }
                    actions.appendChild(downloadLink);

                    const notesButton = createElement("button", "btn");
                    notesButton.textContent = "Release notes";
                    notesButton.addEventListener("click", function () {
                        openNotesModal(selectedRelease);
                    });
                    actions.appendChild(notesButton);

                    const copyPanel = createElement("div", "copy-panel");
                    const copyUrlButton = createElement("button", "btn btn-small btn-copy");
                    copyUrlButton.textContent = "Copy URL";
                    copyUrlButton.addEventListener("click", function () {
                        const url = window.location.origin + buildDownloadUrl(appId, selectedVersion, selectedPlatform);
                        navigator.clipboard.writeText(url).then(function () {
                            copyUrlButton.textContent = "Copied!";
                            setTimeout(function () {
                                copyUrlButton.textContent = "Copy URL";
                            }, 1500);
                        });
                    });
                    copyPanel.appendChild(copyUrlButton);

                    content.appendChild(actions);
                    content.appendChild(copyPanel);
                    card.appendChild(content);
                    return card;
                }

                function renderAppGrid() {
                    const filter = searchInput.value.toLowerCase();
                    grid.innerHTML = "";
                    for (let i = 0; i < state.apps.length; i = i + 1) {
                        const app = state.apps[i];
                        if (
                            filter.length > 0 &&
                            app.name.toLowerCase().indexOf(filter) < 0 &&
                            app.id.toLowerCase().indexOf(filter) < 0
                        ) {
                            continue;
                        }
                        grid.appendChild(renderAppCard(app));
                    }
                    if (grid.children.length === 0) {
                        grid.appendChild(createElement("div", "app-card", "No apps match your search."));
                    }
                }

                function openNotesModal(release) {
                    modalTitle.textContent = release.tag + " notes";
                    modalBody.innerHTML = "<div class='release-notes'>" + renderMarkdown(release.notes) + "</div>";
                    modal.classList.add("is-visible");
                    modal.style.display = "flex";
                    document.body.classList.add("modal-open");
                }

                function closeNotesModal() {
                    modal.classList.remove("is-visible");
                    modal.style.display = "";
                    document.body.classList.remove("modal-open");
                }

                async function fetchJson(url) {
                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error("HTTP " + response.status + " " + response.statusText);
                    }
                    return response.json();
                }

                async function loadApps() {
                    showLoading();
                    try {
                        const data = await fetchJson("/api/apps");
                        state.apps = data.apps || [];
                        renderAppGrid();
                        for (let i = 0; i < state.apps.length; i = i + 1) {
                            loadReleases(state.apps[i].id);
                        }
                    } catch (err) {
                        showError(err.message);
                    }
                }

                async function loadReleases(appId) {
                    try {
                        const data = await fetchJson("/api/releases/" + encodeURIComponent(appId) + "?per_page=100");
                        state.releasesByApp[appId] = data;
                        renderAppGrid();
                    } catch (err) {
                        state.releasesByApp[appId] = { releases: [], total: 0 };
                        renderAppGrid();
                    }
                }

                function updateOnlineStatus() {
                    if (navigator.onLine) {
                        offlineBanner.classList.add("is-hidden");
                        offlineBanner.classList.remove("is-visible");
                    } else {
                        offlineBanner.classList.remove("is-hidden");
                        offlineBanner.classList.add("is-visible");
                    }
                }

                searchInput.addEventListener("input", renderAppGrid);
                modalClose.addEventListener("click", closeNotesModal);
                modal.addEventListener("click", function (event) {
                    if (event.target === modal) {
                        closeNotesModal();
                    }
                });
                document.addEventListener("keydown", function (event) {
                    if (event.key === "Escape") {
                        closeNotesModal();
                    }
                });
                window.addEventListener("online", updateOnlineStatus);
                window.addEventListener("offline", updateOnlineStatus);

                updateOnlineStatus();
                loadApps();
            })();
        </script>
    </body>
</html>
